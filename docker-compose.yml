services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking_dev
      POSTGRES_DB: parking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d parking"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://parking:parking_dev@db:5432/parking
      BACKEND_PUBLIC_URL: http://localhost:8000
      FRONTEND_PUBLIC_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      MOCK_PAYMENTS: "true"
      DEVICE_HMAC_SECRET: dev_cambiar_en_produccion_minimo_32_chars_xx
      DEFAULT_GATE_DEVICE_ID: gate-01
      ENTRY_GATE_DEVICE_ID: gate-entry-01
      SESSION_SIGNING_SECRET: dev_session_signing_secret_cambiar
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
